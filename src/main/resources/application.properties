spring.application.name=donaton-bff
server.port=8085

# URLs de los microservicios (se sobrescriben via env vars en Docker)
services.donaciones.url=http://localhost:8082/api/v1/donaciones
services.necesidades.url=http://localhost:8083/api/v1/necesidades
services.logistica.url=http://localhost:8084/api/v1/logistica

# Configuraci\u00f3n de timeout para RestClient
spring.web.client.connect-timeout=5000
spring.web.client.read-timeout=10000
